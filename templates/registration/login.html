<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(
                135deg,
                #141414,
                #1f1f1f
            );

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:Arial;
        }

        .login-card{

            width:420px;

            background:#222;

            border-radius:25px;

            padding:40px;

            box-shadow:
                0 0 30px rgba(0,0,0,0.5);

            color:white;
        }

        .title{

            text-align:center;

            margin-bottom:30px;

            font-size:32px;

            font-weight:bold;

            color:#00bfff;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:10px;

            margin-bottom:20px;

            border:none;

            border-radius:12px;

            background:#333;

            color:white;
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:12px;

            background:#00bfff;

            color:white;

            font-size:18px;

            transition:0.3s;
        }

        button:hover{

            background:#0095cc;
        }

        .links{

            text-align:center;

            margin-top:20px;
        }

        a{

            color:#00bfff;

            text-decoration:none;
        }

        .error-box{
            background: #ff3b3b;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="title">

        BarberShop CRM

    </div>

    {% if form.errors %}
        <div class="error-box">
            Wrong username or password
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button>

            Login

        </button>

    </form>

    <div class="links">

        <a href="/accounts/password_reset/">

            Forgot password?

        </a>

        <br><br>

        <a href="/register/">

            Create account

        </a>

    </div>

</div>

</body>
</html>
