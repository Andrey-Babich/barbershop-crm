<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Barbershop CRM</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {
            background-color: #121212;
            color: white;
        }

        .card {
            background-color: #1f1f1f;
            border-radius: 15px;
        }

        h3 {
            color: #ffffff;
        }

        p {
            color: #d0d0d0;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-5">
        Choose Your Barber
    </h1>

    <div class="row">

        {% for master in masters %}

        <div class="col-md-4">

            <div class="card p-3 mb-4">

                <div class="card-body">

                    <h3>
                        {{ master.first_name }}
                        {{ master.last_name }}
                    </h3>

                    <p>
                        {{ master.position }}
                    </p>

                    <a
                        href="/booking/{{ master.id }}/"
                        class="btn btn-warning"
                    >
                        Book Now
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
